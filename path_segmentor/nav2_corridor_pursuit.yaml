amcl:
  ros__parameters:
    enabled: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/local
    bt_loop_duration: 10
    action_server_wait_timeout: 5.0
    default_server_timeout: 50
    wait_for_service_timeout: 5000
    # ── CHANGED: point to the corridor-aware behaviour tree ──────────────────
    # Copy construction_bt_tp_corridor.xml to the same directory as your other
    # BT files, OR use a full absolute path here.
    default_nav_through_poses_bt_xml: "construction_bt_tp_corridor.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - nav2_progress_checker_selector_bt_node

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    differential_drive: true
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 120.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 180.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 1.0
      yaw_goal_tolerance: 5.0

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 1.5

      use_velocity_scaled_lookahead_dist: true
      lookahead_dist: 3.0
      min_lookahead_dist: 2.0
      max_lookahead_dist: 5.0
      lookahead_time: 1.5

      rotate_to_heading_angular_vel: 0.7
      transform_tolerance: 0.3

      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 4.0

      use_collision_detection: false
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false

      allow_reversing: false
      use_rotate_to_heading: false

      max_angular_accel: 1.5
      max_robot_pose_search_dist: 10.0

      interpolate_curvature_after_goal: false

# ── LOCAL COSTMAP ─────────────────────────────────────────────────────────────
# Key changes from nav2_bare_pure_pursuit.yaml:
#
#   1. obstacle_layer added with TWO observation sources:
#
#      corridor_cloud  (/corridor/obstacle_cloud)
#        WALL pixels from path_segmentor, unprojected to 3D in camera frame.
#        Marks real detected obstacles (bushes, pipes, fences) as LETHAL.
#        clearing: true  — rays from the sensor clear free space too.
#
#      boundary_cloud  (/corridor/boundary_cloud)
#        Virtual fence along the corridor left+right edges in MAP frame.
#        Prevents the planner from routing OUTSIDE the ±1 m safety zone.
#        clearing: false — fence must NEVER be erased by raycasting.
#
#   2. update_frequency: 2 → 5 Hz  (see new obstacles faster)
#   3. inflation_radius: 0.0 → 0.1  (robot 1.2 m wide in a 2 m corridor —
#      cannot inflate much or the planner can't find any route at all)
#
# Robot footprint: 1.96 m long × 1.2 m wide (from original yaml)
# Corridor width: ±1 m = 2 m total lateral clearance: 0.4 m — keep inflation tiny.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.2
      track_unknown_space: false
      footprint: "[ [0.98, 0.6], [0.98, -0.6], [-0.98, -0.6], [-0.98, 0.6] ]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: corridor_cloud boundary_cloud

        # Real obstacles from depth pipeline (camera frame, TF done by costmap)
        corridor_cloud:
          topic: /corridor/obstacle_cloud
          data_type: PointCloud2
          sensor_frame: ""       # taken from message header (cam_frame_)
          marking: true
          clearing: true         # rays from sensor clear free space
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.3
          raytrace_max_range: 12.0
          raytrace_min_range: 0.3
          inf_is_valid: false

        # Virtual corridor fence (map frame — no TF needed)
        # Points published at 0.15 m spacing, stacked at 4 heights (0.1/0.5/1.0/1.5 m)
        boundary_cloud:
          topic: /corridor/boundary_cloud
          data_type: PointCloud2
          sensor_frame: ""
          marking: true
          clearing: false        # NEVER erase — the fence is permanent each frame
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 200.0
          obstacle_min_range: 0.0
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 0.1   # small — 0.4 m clearance in corridor, can't go larger

      always_send_full_costmap: true

# ── GLOBAL COSTMAP ────────────────────────────────────────────────────────────
# Unchanged from nav2_bare_pure_pursuit.yaml.
# Obstacles from the depth pipeline are close-range → local costmap only.
# The global planner provides the initial GPS-anchored route.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 200
      height: 200
      resolution: 0.5
      track_unknown_space: false
      footprint: "[ [0.98, 0.3], [0.98, -0.3], [-0.98, -0.3], [-0.98, 0.3] ]"
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 0.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.6
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 30
    stop_on_failure: true
    waypoint_task_executor_plugin: "wait_at_waypoint"
    action_server_result_timeout: 3000.0
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 20

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.75, 0.0, 0.8]
    min_velocity: [0.0, 0.0, -0.8]
    max_accel: [1.75, 0.0, 1.0]
    max_decel: [-1.75, 0.0, -1.0]
    odom_topic: "/odometry/local"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.8

# ── COLLISION MONITOR ────────────────────────────────────────────────────────
# Unchanged from nav2_bare_pure_pursuit.yaml.
# Still uses the raw ZED point cloud as the HARDWARE safety backstop.
#
# Relationship to the BT replan layer:
#   BT IsPathValid + replan → tries to steer around obstacle BEFORE entering stop zone
#   Collision monitor        → hard stop if obstacle enters the forward polygon anyway
#
# The two layers work together: BT handles anticipatory avoidance,
# collision monitor handles emergency stops. If BT replan fails (no route),
# the collision monitor will already have stopped the vehicle.
collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel
    cmd_vel_out_topic: cmd_vel_out
    state_topic: collision_monitor/state
    transform_tolerance: 0.2
    source_timeout: 2.0
    base_shift_correction: True
    stop_pub_timeout: 1.0
    polygons: ["PolygonStop","PolygonSlow"]
    PolygonStop:
      type: polygon
      points: [3.0, 0.70,  3.0, -0.70,  -0.5, -0.60,  -0.5, 0.60]
      action_type: stop
      visualize: True
      polygon_pub_topic: polygon_stop
      enabled: True
    PolygonSlow:
      type: polygon
      points: [3.0, 0.80,  3.0, -0.80,  -0.6, -0.70,  -0.6, 0.70]
      action_type: slowdown
      slowdown_ratio: 0.5
      visualize: True
      polygon_pub_topic: polygon_slowdown
      enabled: True

    observation_sources: ["zed"]
    zed:
      type: "pointcloud"
      topic: "/zed/zed_node/point_cloud/cloud_registered"
      min_height: 0.6
      max_height: 2.0
      source_timeout: 2.5
      enabled: True
